name: CI Validation

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      - name: Install dependencies
        run: bun install --frozen-lockfile
        timeout-minutes: 2

      - name: Check formatting
        run: |
          npx prettier --check "**/*.md" "**/*.yml" "**/*.yaml" || {
            echo "Formatting check failed. Run 'bun run format' to fix."
            exit 1
          }
