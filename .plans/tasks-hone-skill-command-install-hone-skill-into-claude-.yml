  - id: task-002
    title: "Create src/skill.ts module with printSkill()"
    description: |
      Create src/skill.ts that exports a printSkill() async function. Use import { readFile } from 'fs/promises' and resolve path via import.meta.dir + '/../skills/hone/SKILL.md'. Because bun build --compile does not bundle assets, embed the skill file contents as a TypeScript string constant as a fallback: try reading from filesystem first, catch ENOENT and fall back to the embedded constant. On unrecoverable error print a clear message to stderr and exit with code 1. Print installation instructions (referencing ~/.claude/skills/hone/SKILL.md) and file contents to stdout.
    status: completed
    dependencies:
      - task-001
    acceptance_criteria:
