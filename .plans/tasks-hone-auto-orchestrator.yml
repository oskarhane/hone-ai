  - id: task-006
    title: "Cross-cutting: resume-from-state, halt-on-failure, final report"
    description: |
      Add the orchestrator control behaviors. Re-entrancy: on invocation detect existing
      .plans/ files for the resolved slug and resume from the first incomplete phase (e.g.
      pending tasks -> jump to run) instead of redoing work. Failure handling: if any phase
      fails (run can't finish a task after retries, or prd-to-tasks yields zero tasks), halt
      at that phase and report where it stopped and what is committed vs pending — never
      proceed with bad state. Emit phase-transition banners throughout and a final summary
      report (slug, PRD path, tasks implemented + review tasks added across rounds, review
      outcome, and the "Next: /hone:prune" line).
    status: completed
    dependencies:
      - task-005
    acceptance_criteria:
      - "Existing .plans/ files for the slug trigger resume from the first incomplete phase"
      - "A phase failure halts the chain and reports stop point, committed work, and pending work"
      - "Phase-transition banners print at each handoff"
      - "Final report includes slug, PRD path, task/review-task counts, outcome, and prune next-step"
    completed_at: 2026-06-08T08:12:30Z

