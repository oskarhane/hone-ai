  - id: task-009
    title: "Document the inline-chain depth tradeoff in AGENTS.md"
    description: |
      The hone skills deliberately use multi-level inline references (auto reads fix, which
      reads run) so logic stays DRY with a single source of truth. This runs against the
      Agent Skills best practice "keep references one level deep from SKILL.md", which warns
      that Claude may only partially read (e.g. `head -100`) files reached through nested
      references. hone's mitigation is the explicit "re-read that file and follow it
      verbatim" wording in every inline reference. Add a short note to AGENTS.md capturing
      this as an intentional convention: skills inline sibling SKILL.md files verbatim for
      DRY; this is a conscious tradeoff against the one-level-deep guidance; future agents
      MUST keep the "re-read and follow verbatim" instruction wording and MUST NOT flatten
      the chain by copy-pasting sub-skill steps. Keep it terse — one tight note in the
      relevant AGENTS.md section, no prose padding.
    status: pending
    source: review
    dependencies: []
    acceptance_criteria:
      - "AGENTS.md documents the verbatim inline-reference convention and that it is an intentional tradeoff vs one-level-deep guidance"
      - "The note instructs future agents to preserve the 're-read and follow verbatim' wording and not flatten the chain"
      - "Note is terse (a few lines), placed in a sensible AGENTS.md section"
      - "`bun run format` passes"
    completed_at: null
