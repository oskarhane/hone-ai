  - id: task-003
    title: "Implement migrateV1ToV2 function"
    description: |
      Write a pure migrateV1ToV2(v1: LegacyConfig): HoneConfig function in config.ts. Phase keys from v1.models are copied only into the defaultAgent's models block; bare agent strings (claude, opencode) go into their respective model fields.
      
    status: completed
    dependencies:
      - task-001
      - task-002
    acceptance_criteria:
      - "defaultAgent → agent (defaults to DEFAULT_AGENT if absent)"
      - "v1.models.claude → claude.model; v1.models.opencode → opencode.model"
      - "Phase keys (prd, implement, review, finalize, prdToTasks, agentsMd, extendPrd) copied only into defaultAgent's models block"
      - "lintCommand and agentsDocsDir carry over unchanged"
      - "Function is idempotent: migrating a v1 config twice produces the same v2 output"
      - "bun run tsc --noEmit passes"
    completed_at: 2026-03-08T10:30:00.000Z

