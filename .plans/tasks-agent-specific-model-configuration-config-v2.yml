    status: completed
    dependencies:
      - task-003
    acceptance_criteria:
      - "v1 config (no version field) triggers migrateV1ToV2 and writes v2 to disk"
      - "v2 config (version: 2) loaded without migration"
      - "loadConfigWithoutCreation also migrates v1 in-memory (no disk write since file already exists)"
      - "Migration on already-migrated file is a no-op"
      - "bun run tsc --noEmit passes"
    completed_at: 2026-03-08T10:30:00.000Z

